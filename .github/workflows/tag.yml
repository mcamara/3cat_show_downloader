name: Tag Release

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create tag from Cargo.toml version
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep -A20 '\[workspace.package\]' Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"
      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.get_version.outputs.tag }}" | grep -q .; then
            echo "Tag ${{ steps.get_version.outputs.tag }} already exists, skipping"
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${{ steps.get_version.outputs.tag }} does not exist, creating"
            echo "should_tag=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        if: ${{ steps.check_tag.outputs.should_tag == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.get_version.outputs.tag }}" "${{ github.event.workflow_run.head_sha }}"
          git push origin "${{ steps.get_version.outputs.tag }}"
